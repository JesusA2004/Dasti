    <!-- JSON-LD: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "¿Qué significa DASTI?",
          "acceptedAnswer": { "@type": "Answer", "text": "DASTI significa Desarrollo y Aplicación de Soluciones en TI. Es el enfoque central de la empresa: desarrollar e implementar soluciones tecnológicas reales y funcionales para negocios y empresas." }
        },
        {
          "@type": "Question",
          "name": "¿DASTI solo desarrolla páginas web?",
          "acceptedAnswer": { "@type": "Answer", "text": "No. DASTI desarrolla e implementa soluciones en Tecnologías de la Información: software a medida, correos corporativos, redes, sistemas mesh, soporte técnico, equipos de cómputo, automatización, integración de sistemas y presencia digital. El desarrollo web es solo una parte del portafolio." }
        },
        {
          "@type": "Question",
          "name": "¿Atienden en Morelos y Cuernavaca?",
          "acceptedAnswer": { "@type": "Answer", "text": "Sí. DASTI opera principalmente en Morelos, con enfoque en Cuernavaca y la zona metropolitana cercana. Desde ahí atendemos proyectos locales de forma presencial o remota." }
        },
        {
          "@type": "Question",
          "name": "¿Pueden atender proyectos fuera de Morelos?",
          "acceptedAnswer": { "@type": "Answer", "text": "Sí. También atendemos proyectos en la Ciudad de México, Estado de México, Puebla y estados cercanos. La mayoría de servicios de software, correo, automatización e integración se realizan de forma remota sin restricción geográfica." }
        },
        {
          "@type": "Question",
          "name": "¿Ofrecen correos corporativos?",
          "acceptedAnswer": { "@type": "Answer", "text": "Sí. Implementamos y administramos correos con dominio propio, configuramos cuentas por área, aplicamos configuración técnica de seguridad (SPF, DKIM, DMARC) y brindamos soporte continuo." }
        },
        {
          "@type": "Question",
          "name": "¿Pueden apoyar con redes y sistemas mesh?",
          "acceptedAnswer": { "@type": "Answer", "text": "Sí. Podemos revisar cobertura actual, configurar routers y puntos de acceso, implementar sistemas mesh para ampliar señal y habilitar roaming automático entre puntos." }
        },
        {
          "@type": "Question",
          "name": "¿También suministran equipos de cómputo?",
          "acceptedAnswer": { "@type": "Answer", "text": "Sí. Podemos evaluar si conviene actualizar equipos existentes con SSD, RAM u optimización, o adquirir equipos nuevos configurados según el perfil de uso de cada área." }
        },
        {
          "@type": "Question",
          "name": "¿El cotizador muestra precios finales?",
          "acceptedAnswer": { "@type": "Answer", "text": "No. El cotizador muestra una referencia aproximada orientativa. El precio final se confirma después de revisar el alcance real, requerimientos técnicos, licencias, equipos, ubicación y tiempos de entrega en una propuesta formal." }
        },
        {
          "@type": "Question",
          "name": "¿Pueden emitir factura?",
          "acceptedAnswer": { "@type": "Answer", "text": "Sí. DASTI puede emitir CFDI (Comprobante Fiscal Digital por Internet) en caso de ser requerido por el cliente o la empresa contratante." }
        }
      ]
    }
